# captain-mast broker configuration
# Syntax is compatible with Mosquitto's mosquitto.conf

# ── Listeners ─────────────────────────────────────────────────────────────────
#
# Each `listener` line starts a new listener block.  TLS/mTLS directives
# (cafile, certfile, keyfile, require_certificate) apply to the listener
# declared immediately above them.

# mTLS on port 8883 — clients must present a certificate signed by cafile.
# This is the recommended production configuration for device fleets.
listener 8883
cafile              /etc/captain-mast/certs/ca.crt
certfile            /etc/captain-mast/certs/server.crt
keyfile             /etc/captain-mast/certs/server.key
require_certificate true

# Plain TLS on port 8884 — server authenticates to client, but client cert
# is NOT required.  Suitable for web/dashboard clients that use passwords only.
# listener 8884
# certfile /etc/captain-mast/certs/server.crt
# keyfile  /etc/captain-mast/certs/server.key

# Plain TCP on 1883 — no encryption.  Only enable on trusted/loopback networks.
# listener 1883

# WebSocket + mTLS on port 9443
# listener 9443
# websocket           true
# cafile              /etc/captain-mast/certs/ca.crt
# certfile            /etc/captain-mast/certs/server.crt
# keyfile             /etc/captain-mast/certs/server.key
# require_certificate true

# ── Authentication ────────────────────────────────────────────────────────────

# Path to bcrypt password file (managed with: captain-mast passwd set <user>)
password_file /etc/captain-mast/passwd

# Path to ACL rules file
acl_file /etc/captain-mast/acl

# Set to true to allow clients with no username/password.
# With mTLS enabled you still want this false so every client
# must pass both certificate verification AND password auth.
allow_anonymous false

# ── Logging ───────────────────────────────────────────────────────────────────

# One of: debug, info, notice, warning, error, all
log_level info

# One of: stdout, stderr, file /path/to/file
log_dest stdout
# log_dest file /var/log/captain-mast/broker.log

# ── Persistence ───────────────────────────────────────────────────────────────

persistence true
persistence_location /var/lib/captain-mast/

# ── Connection limits ─────────────────────────────────────────────────────────

# -1 = unlimited
max_connections -1
max_inflight_messages 20
max_queued_messages 1000

# ── Hugging Face inference (proactive threat detection) ───────────────────────
#
# When enabled, captain-mast runs an internal monitor that:
#   1. Observes every CONNECT (via the auth handler event channel)
#   2. Subscribes to '#' via an in-process broker link to see all published msgs
#   3. Periodically calls the HF zero-shot classification API with a natural
#      language summary of recent broker activity
#   4. On high-confidence threat detection, writes implicated clients to the
#      BlockList so their next CONNECT is rejected before credential check
#
# The default model (facebook/bart-large-mnli) classifies activity into:
#   normal activity | brute force attack | unauthorized device |
#   credential stuffing | anomalous traffic
#
# Get a free API key at https://huggingface.co/settings/tokens

hf_enabled              false
hf_api_key              hf_xxxxxxxxxxxxxxxxxxxx
hf_model                facebook/bart-large-mnli
# hf_endpoint           https://api-inference.huggingface.co/models/facebook/bart-large-mnli
hf_analysis_interval    30
hf_threat_threshold     0.75
